
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Automation - Product Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #101036; /* Dark blue background matching your logo */
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .product-container {
            background-color: #1b1b4c;
            max-width: 700px;
            width: 100%;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .product-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }
        .product-icon {
            font-size: 45px;
        }
        h1 {
            color: #00d4ff;
            margin: 0;
        }
        h2 {
            color: #00d4ff;
            font-size: 20px;
            margin-top: 30px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 5px;
        }
        p, li {
            line-height: 1.6;
            color: #d1d1f0;
            font-size: 15px;
        }
        ul {
            padding-left: 20px;
        }
        /* Product Image Styling - Ensures full screen/container width */
        .product-image-box {
            width: 100%;
            margin-bottom: 25px;
            text-align: center;
        }
        .product-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            display: block;
        }
        /* Manual Section Box */
        .manual-section {
            background-color: rgba(16, 16, 54, 0.5);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #ff9800; /* Orange accent line */
            margin-top: 20px;
        }
        .manual-step {
            margin-bottom: 15px;
        }
        .step-title {
            font-weight: bold;
            color: #ff9800;
        }
        /* Fixed Action Buttons at the Bottom */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-buy {
            background-color: #00d4ff;
            color: #101036;
            padding: 14px 40px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            text-align: center;
            flex: 2;
            transition: background 0.2s;
        }
        .btn-buy:hover {
            background-color: #00b2d6;
        }
        .btn-back {
            background-color: transparent;
            color: #ffffff;
            padding: 14px 30px;
            border: 1px solid #ffffff;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            text-align: center;
            flex: 1;
            transition: background 0.2s;
        }
        .btn-back:hover {
            background-color: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="product-container">
        
        <div class="product-image-box">
            <img src="Resources kit 2 images/Products main page.png" alt="Project Kit List" class="product-image">
        </div>

        <div class="button-group">
            <a href="index.html" class="btn-back">Go Back</a>
            <a href="index.html#contact" class="btn-buy">Contact us to Buy Now</a>
        </div>

    </div>

</body>
</html>
